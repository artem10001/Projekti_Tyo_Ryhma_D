<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Valmiit pitsat - Pizzeria Fantasia</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f2f2f2;
}

header {
    background: darkred;
    color: white;
    padding: 20px;
    text-align: center;
}

.menu {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px;
}

.pizza {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
}

button {
    background: darkred;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: red;
}

.cart {
    background: white;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
}

input {
    padding: 8px;
    width: 100%;
    margin-bottom: 10px;
}

.total {
    font-weight: bold;
    font-size: 18px;
}

.order-btn {
    background: green;
    width: 100%;
    padding: 12px;
    font-size: 16px;
}

.back-button {
    text-align: center;
    margin-top: 20px;
}

.back-button button {
    background-color: darkred;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

.back-button button:hover {
    background-color: red;
}

.toppings {
    text-align: left;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
<h1>Valmiit pitsat</h1>
</header>

<div class="menu" id="menu"></div>

<div class="back-button">
    <a href="index.html">
        <button>Takaisin pääsivulle</button>
    </a>
</div>

<div class="cart">
<h2>🛒 Ostoskori</h2>
<ul id="cartList"></ul>
<p class="total">Yhteensä: <span id="total">0</span> €</p>

<h3>📦 Tilaustiedot</h3>
<input type="text" id="name" placeholder="Nimi">
<input type="text" id="address" placeholder="Osoite">
<input type="text" id="phone" placeholder="Puhelinnumero">

<button class="order-btn" onclick="tilaa()">Vahvista tilaus</button>

<p id="confirmation"></p>
</div>

<script>
const pizzat = [
["Margherita",10],["Pepperoni",11],["Kebab",12],["Hawaii",11],
["Tonnikala",11.5],["Pollo",10],["Mexicana",10.5],["Opera",11],
["Capricciosa",12],["Pizzatown Special",14],["BBQ Kana",12.5],["Kasvis",9],
["Americana",11.5],["Salami",11],["Kinkku-Ananas",10],["Tuplajuusto",10]
];

const toppings = [
    ["Extra juusto", 1.0],
    ["Pepperoni", 1.5],
    ["Kebab", 1.5],
    ["Paprika", 0.5],
    ["Sieni", 0.5],
    ["Ananas", 0.7],
    ["Tonnikala", 1.2]
];

let cart = [];
let selectedToppings = {}; 

const menu = document.getElementById("menu");

pizzat.forEach((pizza, index) => {
    let toppingsOptions = toppings.map((topping, tIndex) =>
        `<label>
            <input type="checkbox" data-pizza="${index}" data-topping="${tIndex}" onchange="updateTopping(this)">
            ${topping[0]} (+${topping[1]} €)
        </label><br>`
    ).join("");

    menu.innerHTML += `
    <div class="pizza">
        <h3>${pizza[0]}</h3>
        <p>${pizza[1]} €</p>
        <div class="toppings">
            ${toppingsOptions}
        </div>
        <button onclick="addToCart(${index})">Lisää</button>
    </div>
    `;
});

function updateTopping(checkbox){
    const pizzaIndex = parseInt(checkbox.dataset.pizza);
    const toppingIndex = parseInt(checkbox.dataset.topping);

    if(!selectedToppings[pizzaIndex]) selectedToppings[pizzaIndex] = [];

    if(checkbox.checked){
        selectedToppings[pizzaIndex].push(toppingIndex);
    } else {
        selectedToppings[pizzaIndex] = selectedToppings[pizzaIndex].filter(i => i !== toppingIndex);
    }
}

function addToCart(index){
    const existing = cart.find(item => item.index === index && JSON.stringify(item.toppings) === JSON.stringify(selectedToppings[index] || []));
    if(existing){
        existing.qty++;
    } else {
        cart.push({index:index, qty:1, toppings: selectedToppings[index] ? [...selectedToppings[index]] : []});
    }

    // Tyhjennetään valinnat
    if(selectedToppings[index]) {
        selectedToppings[index].forEach(tIndex => {
            document.querySelector(`input[data-pizza="${index}"][data-topping="${tIndex}"]`).checked = false;
        });
    }
    selectedToppings[index] = [];

    updateCart();
}

function removeFromCart(index){
    cart = cart.filter(item => item.index !== index);
    updateCart();
}

function changeQty(index, amount){
    const item = cart.find(i => i.index === index);
    if(item){
        item.qty += amount;
        if(item.qty <= 0){
            removeFromCart(index);
        }
    }
    updateCart();
}

function updateCart(){
    const cartList = document.getElementById("cartList");
    const totalSpan = document.getElementById("total");
    cartList.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
        const pizza = pizzat[item.index];
        let toppingsText = "";
        let toppingsTotal = 0;

        if(item.toppings.length > 0){
            toppingsText = " + ";
            toppingsText += item.toppings.map(tIndex => {
                toppingsTotal += toppings[tIndex][1];
                return toppings[tIndex][0];
            }).join(", ");
        }

        total += (pizza[1] + toppingsTotal) * item.qty;

        cartList.innerHTML += `
        <li>
        ${pizza[0]}${toppingsText} (${item.qty} kpl)
        <button onclick="changeQty(${item.index},1)">+</button>
        <button onclick="changeQty(${item.index},-1)">−</button>
        <button onclick="removeFromCart(${item.index})">Poista</button>
        </li>
        `;
    });

    totalSpan.textContent = total.toFixed(2);
}

function tilaa(){
    const name = document.getElementById("name").value;
    const address = document.getElementById("address").value;
    const phone = document.getElementById("phone").value;

    if(cart.length === 0){
        alert("Ostoskori on tyhjä!");
        return;
    }

    if(!name || !address || !phone){
        alert("Täytä kaikki tiedot!");
        return;
    }

    document.getElementById("confirmation").innerHTML =
    "✅ Kiitos tilauksesta " + name + "! Pitsat toimitetaan osoitteeseen: " + address;

    cart = [];
    updateCart();
}
</script>

</body>
</html>
