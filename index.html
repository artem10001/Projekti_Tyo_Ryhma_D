<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>PizzaTown</title>
    <link rel="stylesheet" href="visual.css">
</head>
<body>
    <div id="nayta_kayttaja" style="position: fixed; top: 10px; right: 10px; font-family: Arial, sans-serif; font-size: 16px;"></div>
<form id="kirjautmis_lomake">
    <input id="nimi" type="text" placeholder="Syötä Nimesi" value="" />
    <input id="salasana" type="password" placeholder="Syötä Salasana" value=""/>
    <input id="rekisteröidy_nappi" type="button" value="Rekisteröidy" onClick="rekisteröidy()" />
    <input id="kirjaudu_sisään_nappi" type="button" value="Kirjaudu Sisään" onClick="login()"/>
    <input id="kirjaudu_ulos_nappi" type="button" value="Kirjaudu ulos" onClick="logout()" style="display: none;"/>
</form>
<script src="scripts.js"></script>

<body>

    <header class="top-logo">
        <img src="Images/Pizza logo.png" alt="Pizza Baronen logo">
        <h1>PizzaTown</h1>
    </header>

    <nav>
        <a href="Valmiit pizzat.html">Valmiit pizzat</a> 
        <a href="index.html">Etusivu</a>
    </nav>

    <p>Tuoretta pizzaa joka päivä</p>

    <div class="container">
        <h2>Tervetuloa!</h2>
        <p>
            Valitse valmis pizza klassikot tai monsteritlistalta tai tee itse oma Fantasia-pizza juuri sinun
            haluamillasi täytteillä.
        </p>
    </div>

    <h1>MIKÄ MAISTUISI TÄNÄÄN?</h1>

    <div class="menu">
        <a href="Valmiit pizzat.html" class="pizza-card">
            <h3>Valmiit pizzat</h3>
            <img src="Images/Valmiit pizzat.jpg" alt="Valmiit pizzat">
        </a>
    </div>

    <div class="pizza-grid">
        <a href="oma.html" class="pizza-card"> 
            <h3>Luo oma pizza</h3>
            <img src="Images/Luo oma.jpg" alt="Luo oma pizza">
        </a>

        <a href="klassikot.html" class="pizza-card">
            <h3>Klassikot</h3>
            <img src="Images/lataa 11.jpg" alt="Klassikot">
        </a>

        <a href="monsterit.html" class="pizza-card">
            <h3>Monsterit</h3>
            <img src="Images/Monster 2.jpg" alt="Monsterit">
        </a>
    </div>

    <script src="scripts.js"></script>

</body>
</html>
