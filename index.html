<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>PizzaTown</title>
    <link rel="stylesheet" href="visuals.css">
</head>

<body>

    <div class="login-bar">
        <div id="nayta_kayttaja"></div>

        <form id="kirjautmis_lomake">
            <input id="nimi" type="text" placeholder="Syötä Nimesi">
            <input id="salasana" type="password" placeholder="Syötä Salasana">

            <input id="rekisteröidy_nappi" type="button" value="Rekisteröidy" onclick="rekisteröidy()">
            <input id="kirjaudu_sisään_nappi" type="button" value="Kirjaudu Sisään" onclick="login()">
            <input id="kirjaudu_ulos_nappi" type="button" value="Kirjaudu ulos" onclick="logout()" style="display:none;">
        </form>
    </div>

    <header class="header">
        <img src="Images/Pizza logo.png" alt="PizzaTown logo" class="logo">
        <h1>PizzaTown</h1>
        <p class="slogan">Tuoretta pizzaa joka päivä</p>
    </header>

    <nav class="navbar">
        <a href="index.html">Etusivu</a>
        <a href="Valmiit pizzat.html">Valmiit pizzat</a>
        <a href="oma.html">Luo oma pizza</a>
        <a href="klassikot.html">Klassikot</a>
    </nav>

    <main>

        <section class="welcome">
            <h2>Tervetuloa!</h2>
            <p>
                Valitse valmis pizza klassikkolistalta tai tee oma Fantasia-pizza
                juuri sinun haluamillasi täytteillä.
            </p>
        </section>

        <section class="menu-section">
            <h2>MIKÄ MAISTUISI TÄNÄÄN?</h2>

            <div class="pizza-grid">

                <a href="Valmiit pizzat.html" class="pizza-card">
                    <img src="Images/Valmiit pizzat.jpg" alt="Valmiit pizzat">
                    <h3>Valmiit pizzat</h3>
                </a>

                <a href="oma.html" class="pizza-card">
                    <img src="Images/Luo oma.jpg" alt="Luo oma pizza">
                    <h3>Luo oma pizza</h3>
                </a>

                <a href="klassikot.html" class="pizza-card">
                    <img src="Images/lataa 11.jpg" alt="Klassikot">
                    <h3>Klassikot</h3>
                </a>

            </div>
        </section>

    </main>

    <script src="scripts.js"></script>

</body>

</html>
