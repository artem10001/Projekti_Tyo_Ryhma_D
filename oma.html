<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Luo oma pizza - Pizzeria Fantasia</title>
<style>
body { font-family: Arial; background:#f4f4f4; margin:0; padding:20px; }
h1 { text-align:center; }

.form-container { 
  background:white; 
  padding:20px; 
  width:60%; 
  margin:auto; 
  border-radius:10px; 
  box-shadow:0 0 10px rgba(0,0,0,0.1); 
}

button { 
  background:#b22222; 
  color:white; 
  padding:10px 15px; 
  border:none; 
  border-radius:5px; 
  cursor:pointer; 
}

button:hover { background:#8b0000; }

.back { text-align:center; margin-top:20px; }

/* Popup */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  background:white;
  padding:20px;
  width:40%;
  margin:10% auto;
  border-radius:10px;
  text-align:center;
}

.success {
  color:green;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>
<body>

<h1>🍕 Luo oma pizza</h1>

<div class="form-container">
<form id="pizzaForm">

<label>Valitse koko:</label><br>
<input type="radio" name="koko" value="Normaali" required> Normaali (8€)<br>
<input type="radio" name="koko" value="Perhe"> Perhe (12€)<br><br>

<label>Valitse täytteet (+1€/kpl):</label><br>
<input type="checkbox" value="Kinkku"> Kinkku<br>
<input type="checkbox" value="Pepperoni"> Pepperoni<br>
<input type="checkbox" value="Kana"> Kana<br>
<input type="checkbox" value="Ananas"> Ananas<br>
<input type="checkbox" value="Aurajuusto"> Aurajuusto<br>
<input type="checkbox" value="Jalapeno"> Jalapeno<br><br>

<button type="submit">Tilaa pizza</button>
</form>
</div>

<div id="orderModal" class="modal">
  <div class="modal-content">
    <h2>Tilauksesi</h2>
    <p id="orderSummary"></p>
    <h3 id="totalPrice"></h3>
    <button onclick="confirmOrder()">Vahvista tilaus</button>
    <button onclick="closeModal()">Peruuta</button>
    <p id="successMessage" class="success"></p>
  </div>
</div>

<div class="back">
<a href="index.html">⬅ Takaisin etusivulle</a>
</div>

<script>
let currentTotal = 0;

document.getElementById("pizzaForm").addEventListener("submit", function(e){
  e.preventDefault();

  let koko = document.querySelector('input[name="koko"]:checked');
  let taytteet = document.querySelectorAll('input[type="checkbox"]:checked');

  let tayteLista = [];
  taytteet.forEach(t => tayteLista.push(t.value));

  let perusHinta = koko.value === "Normaali" ? 8 : 12;
  let tayteHinta = tayteLista.length * 1;
  currentTotal = perusHinta + tayteHinta;

  let yhteenveto = "Koko: " + koko.value + "<br>";
  yhteenveto += "Täytteet: " + (tayteLista.length > 0 ? tayteLista.join(", ") : "Ei täytteitä");

  document.getElementById("orderSummary").innerHTML = yhteenveto;
  document.getElementById("totalPrice").innerHTML = "Yhteensä: " + currentTotal + " €";
  document.getElementById("orderModal").style.display = "block";
});

function closeModal(){
  document.getElementById("orderModal").style.display = "none";
  document.getElementById("successMessage").innerHTML = "";
}

function confirmOrder(){
  document.getElementById("successMessage").innerHTML = "✅ Tilaus onnistui! Kiitos tilauksesta.";
}
</script>

</body>
</html>
